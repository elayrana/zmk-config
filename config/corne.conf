# Mouse support (required for nav_layer)
CONFIG_ZMK_MOUSE=y

# ZMK Studio — live keymap editing over USB
CONFIG_ZMK_STUDIO=y

# Deep sleep — entra en sueño profundo tras 5 min; tecla = reconecta
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=300000

# Bluetooth — 5 perfiles simultáneos
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5

# RGB Underglow deshabilitado
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y

# Uncomment the following line to enable the Corne OLED Display
# CONFIG_ZMK_DISPLAY=y
